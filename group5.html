<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Group 5</title>

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background: linear-gradient(120deg,#ffe066,#bde0fe,#caffbf,#ffc6ff,#ffd6a5);
text-align:center;
overflow-x:hidden;
}

/* HEADER */

header{
padding:40px;
color:#333;
}

header h1{
font-size:42px;
}

/* FLOATING MEMORY ORBS */

.orb{
position:fixed;
border-radius:50%;
opacity:0.4;
animation: float 8s infinite ease-in-out;
}

.o1{width:70px;height:70px;background:#ffd93d;left:10%;top:80%;}
.o2{width:60px;height:60px;background:#4da6ff;left:85%;top:60%;}
.o3{width:80px;height:80px;background:#ff6b6b;left:20%;top:40%;}
.o4{width:60px;height:60px;background:#6bcf63;left:70%;top:30%;}
.o5{width:50px;height:50px;background:#7de3ff;left:50%;top:85%;}
.o6{width:65px;height:65px;background:#ff9f68;left:40%;top:20%;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0);}
}

/* TEAM GRID */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

/* CARD STYLE */

.card{
width:220px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 15px 25px rgba(0,0,0,0.25);
}

/* PROFILE IMAGE */

.card img{
width:110px;
border-radius:50%;
margin-bottom:10px;
}

/* BUTTON */

button{
border:none;
padding:10px 18px;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* EMOTION COLORS */

.joy{border-top:8px solid #ffd93d;}
.joy button{background:#ffd93d;}

.sadness{border-top:8px solid #4da6ff;}
.sadness button{background:#4da6ff;}

.anger{border-top:8px solid #ff4d4d;}
.anger button{background:#ff4d4d;}

.disgust{border-top:8px solid #6bcf63;}
.disgust button{background:#6bcf63;}

.envy{border-top:8px solid #7de3ff;}
.envy button{background:#7de3ff;}

.anxiety{border-top:8px solid #ff9f68;}
.anxiety button{background:#ff9f68;}

/* FOOTER */

footer{
background:#6fbaff;
color:white;
padding:20px;
margin-top:40px;
}

</style>
</head>
